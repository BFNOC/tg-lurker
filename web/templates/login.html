<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - tg-lurker</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z'%3E%3C/path%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme */
            --bg: oklch(0.98 0.005 80);
            --bg-raised: oklch(1 0 0);
            --bg-app: oklch(0.97 0.01 80);
            --text: oklch(0.20 0.02 260);
            --text-secondary: oklch(0.45 0.02 260);
            --text-muted: oklch(0.60 0.02 260);
            --accent: oklch(0.55 0.14 35);
            --accent-hover: oklch(0.48 0.16 35);
            --accent-light: oklch(0.94 0.03 35);
            --danger: oklch(0.58 0.18 25);
            --danger-bg: oklch(0.95 0.04 25);
            --border: oklch(0.92 0.01 260);
            --radius: 14px;
            --radius-sm: 10px;
            --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.08), 0 4px 8px oklch(0 0 0 / 0.04);
            --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Fraunces', Georgia, serif;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: oklch(0.18 0.015 260);
            --bg-raised: oklch(0.22 0.02 260);
            --bg-app: oklch(0.15 0.015 260);
            --text: oklch(0.95 0.01 260);
            --text-secondary: oklch(0.75 0.015 260);
            --text-muted: oklch(0.55 0.015 260);
            --accent: oklch(0.65 0.14 35);
            --accent-hover: oklch(0.72 0.16 35);
            --accent-light: oklch(0.28 0.05 35);
            --danger: oklch(0.65 0.18 25);
            --danger-bg: oklch(0.26 0.05 25);
            --border: oklch(0.30 0.02 260);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-app);
            background-image: 
                radial-gradient(at 0% 0%, var(--accent-light) 0px, transparent 50%),
                radial-gradient(at 100% 100%, var(--danger-bg) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        .theme-toggle-fixed {
            position: absolute;
            top: 24px;
            right: 24px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .theme-toggle-fixed:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
        .theme-toggle-fixed .sun-icon { display: none; }
        [data-theme="dark"] .theme-toggle-fixed .moon-icon { display: none; }
        [data-theme="dark"] .theme-toggle-fixed .sun-icon { display: block; }

        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-logo h1 {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.04em;
        }
        .login-logo p {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .form-group { margin-bottom: 24px; }
        .input-wrapper { position: relative; }
        input {
            font-family: var(--font-body);
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 16px;
            color: var(--text);
            background: var(--bg);
            transition: var(--transition);
            -webkit-appearance: none;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }
        input::placeholder { color: var(--text-muted); }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 700;
            transition: var(--transition);
            box-shadow: 0 4px 12px oklch(0.55 0.14 35 / 0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 16px oklch(0.55 0.14 35 / 0.3); }
        .btn:active { transform: translateY(0); }

        .error {
            color: var(--danger);
            background: var(--danger-bg);
            border: 1px solid var(--danger);
            font-size: 14px;
            font-weight: 600;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <button class="theme-toggle-fixed" onclick="toggleTheme()" aria-label="切换主题">
            <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>
        <div class="login-logo">
            <h1>tg-lurker</h1>
            <p>输入密码以继续</p>
        </div>
        {% if error %}
        <div class="error">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <input type="password" name="password" placeholder="密码" autofocus required>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
    </div>

    <script>
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        html.setAttribute('data-theme', savedTheme);

        function toggleTheme() {
            const current = html.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        }
    </script>
</body>
</html>
